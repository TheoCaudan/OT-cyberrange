---
- name: "Install Docker packages"
  ansible.builtin.apt:
      name:
          - docker.io
          - docker-compose-plugin
      state: present
      update_cache: true
  when: siem_docker_enabled | default(true)

- name: "Ensure SIEM directories exist"
  ansible.builtin.file:
      path: "{{ item }}"
      state: directory
      owner: "{{ siem_user }}"
      group: "{{ siem_group }}"
      mode: "0755"
  loop:
      - "{{ siem_dir }}"
      - "{{ siem_config_dir }}"
      - "{{ siem_data_dir }}"
