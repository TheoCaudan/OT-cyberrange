---
- name: "Create VM base directories"
  ansible.builtin.file:
    path: "/var/lib/libvirt/images/{{ item.name }}"
    state: directory
    mode: "0755"
  loop: "{{ vms }}"

- name: "Prepare VM disks"
  ansible.builtin.command: >
    qemu-img create -f qcow2 -b /var/lib/libvirt/images/{{ item.base_image }}
    /var/lib/libvirt/images/{{ item.name }}/{{ item.name }}.qcow2
  args:
    creates: "/var/lib/libvirt/images/{{ item.name }}/{{ item.name }}.qcow2"
  loop: "{{ vms }}"
  when: item.type == "qcow2"

- name: "Define VMs"
  community.libvirt.virt:
    name: "{{ item.name }}"
    state: running
    command: define
    xml: "{{ lookup('template', 'vm.xml.j2') }}"
    uri: "{{ libvirt_uri }}"
  loop: "{{ vms }}"