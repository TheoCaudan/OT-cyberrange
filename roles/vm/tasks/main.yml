---
- name: "Ensure VM image directory exists"
  ansible.builtin.file:
      path: "/var/lib/libvirt/images"
      state: directory
      mode: "0755"

- name: "Check base images exist"
  ansible.builtin.stat:
      path: "{{ item.base_image }}"
  register: base_images
  loop: "{{ vms }}"

- name: "Fail if a base image is missing"
  ansible.builtin.fail:
      msg: "Missing base image: {{ item.item.base_image }}"
  when: not item.stat.exists
  loop: "{{ base_images.results }}"

- name: "Create VM directories"
  ansible.builtin.file:
      path: "/var/lib/libvirt/images/{{ item.name }}"
      state: directory
      mode: "0755"
  loop: "{{ vms }}"

- name: "Create QCOW2 backing disks"
  ansible.builtin.command: >
      qemu-img create -f qcow2 -b {{ item.base_image }}
      /var/lib/libvirt/images/{{ item.name }}/{{ item.name }}.qcow2
  args:
      creates: "/var/lib/libvirt/images/{{ item.name }}/{{ item.name }}.qcow2"
  loop: "{{ vms }}"
  when: item.type == "qcow2"

- name: "Create empty disks for ISO-based VMs"
  ansible.builtin.command: >
      qemu-img create -f qcow2
      /var/lib/libvirt/images/{{ item.name }}/{{ item.name }}.qcow2
      {{ item.disk_gb }}G
  args:
      creates: "/var/lib/libvirt/images/{{ item.name }}/{{ item.name }}.qcow2"
  loop: "{{ vms }}"
  when: item.type == "iso"

- name: "Render VM XML definitions"
  ansible.builtin.template:
      src: "vm.xml.j2"
      dest: "/tmp/{{ item.name }}.xml"
      mode: "0644"
  loop: "{{ vms }}"
