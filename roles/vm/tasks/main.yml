---
- name: "Ensure base images directory exists"
  ansible.builtin.file:
      path: "/var/lib/libvirt/images/base"
      state: directory
      mode: "0755"

- name: "Assert base image exists"
  ansible.builtin.stat:
      path: "{{ item.base_image }}"
  register: base_image_stat
  loop: "{{ vms }}"

- name: "Fail if base image is missing"
  ansible.builtin.fail:
      msg: "Base image {{ item.item.base_image }} is missing"
  when: not item.stat.exists
  loop: "{{ base_image_stat.results }}"

- name: "Create VM disk directories"
  ansible.builtin.file:
      path: "/var/lib/libvirt/images/{{ item.name }}"
      state: directory
      mode: "0755"
  loop: "{{ vms }}"

- name: "Create QCOW2 backing disks"
  ansible.builtin.command: >
      qemu-img create -f qcow2 -b {{ item.base_image }}
      /var/lib/libvirt/images/{{ item.name }}/{{ item.name }}.qcow2
  args:
      creates: "/var/lib/libvirt/images/{{ item.name }}/{{ item.name }}.qcow2"
  loop: "{{ vms }}"
  when: item.type == "qcow2"

- name: "Render VM definition XML"
  ansible.builtin.template:
      src: "vm.xml.j2"
      dest: "/tmp/{{ item.name }}.xml"
      mode: "0644"
  loop: "{{ vms }}"

- name: "Define libvirt VMs"
  community.libvirt.virt:
      name: "{{ item.name }}"
      command: define
      xml: "{{ lookup('template', 'vm.xml.j2') }}"
      uri: "{{ libvirt_uri }}"
  loop: "{{ vms }}"

- name: "Autostart VMs"
  community.libvirt.virt:
      name: "{{ item.name }}"
      command: autostart
      uri: "{{ libvirt_uri }}"
  loop: "{{ vms }}"
