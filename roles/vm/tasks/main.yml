---
- name: "Ensure VM image directory exists"
  ansible.builtin.file:
      path: "/var/lib/libvirt/images"
      state: directory
      mode: "0755"

- name: "Check base images exist"
  ansible.builtin.stat:
      path: "{{ vm.base_image }}"
  register: base_images
  loop: "{{ vms }}"
  loop_control:
      loop_var: vm
  when: vm.base_image is defined

- name: "Fail if a base image is missing"
  ansible.builtin.fail:
      msg: "Missing base image: {{ item.item.base_image }}"
  when: not item.stat.exists
  loop: "{{ base_images.results }}"
  loop_control:
      label: "{{ item.item.name }}"

- name: "Process Linux VMs"
  ansible.builtin.include_tasks: linux.yml
  loop: "{{ vms }}"
  loop_control:
      loop_var: vm
  when:
      - vm.type == "qcow2"
      - vm.os_family | default("linux") == "linux"

- name: "Process Windows VMs"
  ansible.builtin.include_tasks: windows.yml
  loop: "{{ vms }}"
  loop_control:
      loop_var: vm
  when:
      - vm.type == "iso"
      - vm.os_family | default("linux") == "windows"
