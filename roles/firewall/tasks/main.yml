---
- name: "Install firewall packages"
  ansible.builtin.apt:
      name:
          - nftables
          - ufw
      state: present
      update_cache: true

- name: "Render backend firewall configuration"
  ansible.builtin.template:
      src: "nftables.conf.j2"
      dest: "/etc/nftables.conf"
      owner: "root"
      group: "root"
      mode: "0644"
  notify: "Restart nftables"

- name: "Render frontend firewall intent configuration"
  ansible.builtin.template:
      src: "ufw.conf.j2"
      dest: "/etc/ufw/ufw.conf"
      owner: "root"
      group: "root"
      mode: "0644"

- name: "Ensure backend firewall service is enabled"
  ansible.builtin.systemd:
      name: "nftables"
      enabled: true
      state: started

- name: "Frontend mode notice"
  ansible.builtin.debug:
      msg: "Frontend intent layer is enabled; backend firewall remains authoritative."
  when: firewall_frontend_enabled | default(false)
