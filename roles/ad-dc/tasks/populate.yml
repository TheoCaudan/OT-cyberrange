---
- name: "Render post-install PowerShell script"
  ansible.builtin.template:
      src: "populate_ad.ps1.j2"
      dest: "C:\\Windows\\Temp\\{{ ad_dc_post_install_script }}"
      mode: "0644"

- name: "Run post-install PowerShell script"
  ansible.windows.win_shell: >
      powershell.exe -ExecutionPolicy Bypass -File
      C:\Windows\Temp\{{ ad_dc_post_install_script }}
  register: populate_result
  changed_when: true

- name: "Show populate output"
  ansible.builtin.debug:
      var: populate_result.stdout_lines
