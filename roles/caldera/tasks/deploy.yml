---
- name: "Render CALDERA environment file"
  ansible.builtin.template:
    src: "caldera.env.j2"
    dest: "{{ caldera_dir }}/.env"
    owner: "{{ caldera_user }}"
    group: "{{ caldera_group }}"
    mode: "0644"
  notify: "Restart CALDERA stack"

- name: "Render CALDERA docker compose file"
  ansible.builtin.template:
    src: "docker-compose.yml.j2"
    dest: "{{ caldera_dir }}/docker-compose.yml"
    owner: "{{ caldera_user }}"
    group: "{{ caldera_group }}"
    mode: "0644"
  notify: "Restart CALDERA stack"

- name: "Start CALDERA stack"
  ansible.builtin.command: docker compose up -d
  args:
    chdir: "{{ caldera_dir }}"
  when: caldera_docker_enabled | default(true)
