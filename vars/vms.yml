vms:
    - name: "fw-it-dmz"
      role: "firewall"
      zone: "it-dmz"
      cpu: 2
      ram_mb: 2048
      disk_gb: 20
      type: "qcow2"
      os_family: "linux"
      base_image: "images/debian-genericcloud.qcow2"
      role_vars: "vars/firewall-it-dmz.yml"
      networks:
          - "it"
          - "dmz"

    - name: "fw-dmz-otl3"
      role: "firewall"
      zone: "dmz-otl3"
      cpu: 2
      ram_mb: 2048
      disk_gb: 20
      type: "qcow2"
      os_family: "linux"
      base_image: "images/debian-genericcloud.qcow2"
      role_vars: "vars/firewall-dmz-otl3.yml"
      networks:
          - "dmz"
          - "otl3"

    - name: "fw-otl3-otl2"
      role: "firewall"
      zone: "otl3-otl2"
      cpu: 2
      ram_mb: 2048
      disk_gb: 20
      type: "qcow2"
      os_family: "linux"
      base_image: "images/debian-genericcloud.qcow2"
      role_vars: "vars/firewall-otl3-otl2.yml"
      networks:
          - "otl3"
          - "otl2"

    - name: "siem-ids"
      role: "siem"
      zone: "dmz"
      cpu: 4
      ram_mb: 4096
      disk_gb: 40
      type: "qcow2"
      os_family: "linux"
      base_image: "images/debian-genericcloud.qcow2"
      role_vars: "vars/siem.yml"
      networks:
          - "dmz"

    - name: "dc"
      role: "ad-dc"
      zone: "it"
      cpu: 4
      ram_mb: 8192
      disk_gb: 60
      type: "iso"
      os_family: "windows"
      firmware: "uefi"
      base_image: "iso/windows-server-2022.iso"
      role_vars: "vars/ad-dc.yml"
      networks:
          - "it"

    - name: "client-ad"
      role: "ad-client"
      zone: "it"
      cpu: 2
      ram_mb: 4096
      disk_gb: 40
      type: "qcow2"
      os_family: "linux"
      base_image: "images/debian-genericcloud.qcow2"
      role_vars: "vars/ad-client.yml"
      extra_roles:
        - "caldera"
      extra_role_vars:
        caldera: "vars/caldera.yml"
      networks:
        - "it"

    - name: "bastion"
      role: "bastion"
      zone: "dmz"
      cpu: 2
      ram_mb: 2048
      disk_gb: 20
      type: "qcow2"
      os_family: "linux"
      base_image: "images/debian-genericcloud.qcow2"
      role_vars: "vars/bastion.yml"
      networks:
          - "dmz"

    - name: "scada"
      role: "scada"
      zone: "otl3"
      cpu: 4
      ram_mb: 4096
      disk_gb: 40
      type: "qcow2"
      os_family: "linux"
      base_image: "images/debian-genericcloud.qcow2"
      role_vars: "vars/scada.yml"
      networks:
          - "otl3"

    - name: "plc"
      role: "plc"
      zone: "otl2"
      cpu: 2
      ram_mb: 2048
      disk_gb: 20
      type: "qcow2"
      os_family: "linux"
      base_image: "images/debian-genericcloud.qcow2"
      role_vars: "vars/plc.yml"
      networks:
          - "otl2"
