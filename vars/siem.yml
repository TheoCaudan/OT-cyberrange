---
siem_name: "siem-ids"
siem_timezone: "UTC"
siem_docker_enabled: true

siem_dir: "/opt/siem"
siem_config_dir: "/opt/siem/config"
siem_data_dir: "/opt/siem/data"

siem_user: "root"
siem_group: "root"

siem_enable_wazuh: true
siem_enable_suricata: true

siem_wazuh_indexer_image: wazuh/wazuh-indexer:4.14.6
siem_wazuh_manager_image: wazuh/wazuh-manager:4.14.6
siem_wazuh_dashboard_image: wazuh/wazuh-dashboard:4.14.6
siem_suricata_image: "jasonish/suricata"

siem_wazuh_api_port: 55000
siem_wazuh_ui_port: 5601

siem_suricata_capture_interface: "eth1"
siem_suricata_capture_mode: "af-packet"

siem_home_nets:
    - "192.168.20.0/24"
    - "192.168.30.0/24"
    - "192.168.40.0/24"

#siem_external_nets:
#  - "0.0.0.0/0"

siem_logging_enabled: true
siem_log_level: "info"
