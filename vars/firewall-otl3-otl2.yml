firewall_name: "fw-otl3-otl2"

firewall_zone_a: "otl3"
firewall_zone_b: "otl2"

firewall_interfaces:
    input: "otl3"
    output: "otl2"

firewall_frontend_mode: "ufw"
firewall_backend_mode: "nftables"

firewall_frontend_enabled: true
firewall_backend_enabled: true

firewall_nft_input_policy: "drop"
firewall_nft_forward_policy: "drop"
firewall_nft_output_policy: "accept"

firewall_ufw_default_input: "deny"
firewall_ufw_default_output: "allow"
firewall_ufw_default_forward: "deny"

firewall_allowed_tcp_ports: []
firewall_allowed_udp_ports: []

firewall_allowed_forward_rules:
    - name: "OTL3 to OTL2 Modbus TCP"
      iif: "otl3"
      oif: "otl2"
      proto: "tcp"
      dport: 502
